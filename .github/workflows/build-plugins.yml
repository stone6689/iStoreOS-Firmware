name: Build iStoreOS Firmware (with Plugins)

# Trigger: manual only
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target: x86_64 / arm64 / all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - x86_64
          - arm64

env:
  ISTOREOS_REPO: https://github.com/istoreos/istoreos.git
  ISTOREOS_BRANCH: istoreos-24.10

jobs:
  # ---------------------------------------------------------------------------
  # Decide which targets to build
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" = "x86_64" ]; then
            echo 'matrix={"include":[{"target":"x86_64","config":"configs/x86_64-plugins.config","name":"x86_64"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$TARGET" = "arm64" ]; then
            echo 'matrix={"include":[{"target":"arm64","config":"configs/arm64-plugins.config","name":"arm64"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"target":"x86_64","config":"configs/x86_64-plugins.config","name":"x86_64"},{"target":"arm64","config":"configs/arm64-plugins.config","name":"arm64"}]}' >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build job
  # ---------------------------------------------------------------------------
  build:
    name: Build iStoreOS+Plugins (${{ matrix.name }})
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "[disk] Available before cleanup:"
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          echo "[disk] Available after cleanup:"
          df -h

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "Updating apt and installing OpenWrt build dependencies..."
          sudo -E apt-get -qq update
          
          # 安装基础编译工具链
          sudo -E apt-get -qq install \
            build-essential \
            bison flex gawk gcc g++ gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev libssl3 \
            python3 python3-dev python3-pyelftools python3-setuptools \
            zlib1g-dev file wget curl rsync subversion \
            ccache cmake automake autoconf libtool pkgconf \
            patch unzip tar bzip2 xz-utils cpio \
            libelf-dev libglib2.0-dev libgmp-dev \
            libmpc-dev libmpfr-dev libreadline-dev \
            texinfo help2man intltool ninja-build \
            scons swig xmlto xxd \
            lzma lzop p7zip-full p7zip \
            upx-ucl uglifyjs \
            libltdl-dev libc6-dev-i386 \
            asciidoc doxygen graphviz \
            msmtp nano vim \
            diffutils findutils grep gzip perl util-linux
            
          # 安装 Python 2（如果某些包需要）
          if ! dpkg -l | grep -q python2; then
            echo "[deps] Installing Python 2 for compatibility..."
            sudo apt-get install -y python2 python2-dev
          fi
          
          # 安装 Rust（如果需要）
          if ! command -v rustc &> /dev/null; then
            echo "Installing Rust via rustup..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi
          
          # 安装 Go（PassWall 需要）
          echo "Installing Go..."
          GO_VERSION="1.22.1"
          wget -q "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          sudo tar -C /usr/local -xzf "go${GO_VERSION}.linux-amd64.tar.gz"
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "Go version: $(/usr/local/go/bin/go version)"
          
          # 清理
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Clone iStoreOS source
        run: |
          echo "[source] Cloning ${ISTOREOS_REPO} branch ${ISTOREOS_BRANCH}..."
          git clone \
            --depth 1 \
            --branch "${ISTOREOS_BRANCH}" \
            "${ISTOREOS_REPO}" \
            openwrt
          echo "[source] Clone complete."

      # -----------------------------------------------------------------------
      # Step 1: Write official iStoreOS feeds.conf (without updating yet)
      # Step 2: Inject plugins — appends PassWall feeds to feeds.conf,
      #         adds OpenClash to package/, pre-downloads mihomo kernel
      # Step 3: Update and install ALL feeds in one pass (official + PassWall)
      # This order ensures feeds.conf is complete before any feeds update runs.
      # -----------------------------------------------------------------------
      - name: Write official iStoreOS feeds.conf
        working-directory: openwrt
        run: |
          printf '%s\n' \
            'src-include defaults feeds.conf.default' \
            'src-git third_party https://github.com/linkease/istore-packages.git;main' \
            'src-git diskman https://github.com/jjm2473/luci-app-diskman.git;dev' \
            'src-git oaf https://github.com/jjm2473/OpenAppFilter.git;dev7' \
            'src-git linkease_nas https://github.com/linkease/nas-packages.git;master' \
            'src-git linkease_nas_luci https://github.com/linkease/nas-packages-luci.git;main' \
            'src-git jjm2473_apps https://github.com/jjm2473/openwrt-apps.git;main' \
            > feeds.conf
          echo "[feeds] feeds.conf written:"
          cat feeds.conf

      - name: Inject plugins (OpenClash + PassWall feeds + mihomo kernel)
        working-directory: openwrt
        run: bash ../scripts/inject-plugins.sh ${{ matrix.target }}

      - name: Update and install all feeds
        working-directory: openwrt
        run: bash ../scripts/setup-feeds.sh

      - name: Apply build configuration
        working-directory: openwrt
        run: |
          echo "[config] Applying ${{ matrix.config }}..."
          cp "../${{ matrix.config }}" .config
          make defconfig
          echo "[config] Final .config packages:"
          grep "^CONFIG_PACKAGE_luci-app-openclash\|^CONFIG_PACKAGE_luci-app-passwall\|^CONFIG_TARGET" .config

      - name: Download package sources
        working-directory: openwrt

        run: |
          make download -j$(nproc) V=s 2>&1 | tee /tmp/download.log || true
          find dl -size -1024c -delete || true
          echo "[download] Done."

      - name: Compile firmware
        id: compile
        working-directory: openwrt

        run: |
          echo "[build] Starting compilation with $(nproc) threads..."
          if make -j$(nproc) V=s 2>&1 | tee /tmp/build.log; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "[build] Compilation succeeded."
          else
            echo "[build] Multi-thread build failed. Retrying single-threaded for error details..."
            make -j1 V=s 2>&1 | tee /tmp/build-retry.log
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Debug build output structure
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "=== BUILD OUTPUT DIAGNOSTICS ==="
          echo "1. Checking openwrt directory structure..."
          if [ -d "openwrt" ]; then
            echo "openwrt directory exists"
            echo "Top-level contents:"
            ls -la openwrt/
            echo ""
            
            echo "2. Checking bin directory..."
            if [ -d "openwrt/bin" ]; then
              echo "bin directory exists"
              echo "bin directory contents:"
              ls -la openwrt/bin/
              echo ""
              
              echo "3. Searching for any files in openwrt/bin..."
              find openwrt/bin -type f 2>/dev/null | head -20 || echo "No files found"
            else
              echo "ERROR: openwrt/bin directory does not exist!"
              echo "Possible build output locations:"
              find . -type d -name "bin" 2>/dev/null
            fi
          else
            echo "ERROR: openwrt directory does not exist!"
            echo "Build may have failed despite reporting success"
          fi
          echo "=== DIAGNOSTICS END ==="

      - name: Smart firmware collection
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "=== SMART FIRMWARE COLLECTION ==="
          mkdir -p firmware/${{ matrix.name }}
          
          echo "Searching for firmware files..."
          
          # 策略1：标准 OpenWrt 路径
          STANDARD_FILES=$(find openwrt/bin/targets -type f \( -name "*.img" -o -name "*.img.gz" -o -name "*.bin" -o -name "*.tar.gz" \) ! -path "*/packages/*" 2>/dev/null || true)
          
          if [ -n "$STANDARD_FILES" ]; then
            echo "✓ Found files with standard path:"
            echo "$STANDARD_FILES"
            echo "$STANDARD_FILES" | xargs -I {} cp {} firmware/${{ matrix.name }}/ 2>/dev/null || true
          else
            echo "✗ Standard path failed, trying alternative strategies..."
            
            # 策略2：查找任何看起来像固件的文件
            echo "Searching for any firmware-like files..."
            ALL_FILES=$(find openwrt -type f \( -name "*.img" -o -name "*.img.gz" -o -name "*.bin" -o -name "*.tar.gz" -o -name "*firmware*" -o -name "*image*" \) 2>/dev/null | grep -v "/packages/" || true)
            
            if [ -n "$ALL_FILES" ]; then

              echo "✓ Found files:"
              echo "$ALL_FILES"
              echo "$ALL_FILES" | xargs -I {} cp {} firmware/${{ matrix.name }}/ 2>/dev/null || true
            else
              echo "✗ No firmware files found with any pattern"
              echo "This suggests the build didn't produce firmware files"
              echo ""
              echo "Debug information:"
              echo "All files in openwrt directory:"
              find openwrt -type f 2>/dev/null | head -30 || echo "No files found"
              exit 1

            fi
          fi
          
          # 验证结果

          echo ""
          echo "=== COLLECTION RESULTS ==="
          COLLECTED_FILES=$(find firmware/${{ matrix.name }} -type f 2>/dev/null || true)
          COUNT=$(echo "$COLLECTED_FILES" | wc -l)
          
          if [ "$COUNT" -eq 0 ]; then

            echo "##[error] FAILED: No files collected"
            exit 1

          else
            echo "✓ SUCCESS: Collected $COUNT file(s)"
            echo "Files:"
            ls -lh firmware/${{ matrix.name }}/
          fi

      - name: Upload firmware artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-plugins-${{ matrix.name }}-${{ github.run_number }}
          path: firmware/${{ matrix.name }}/
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-plugins-${{ matrix.name }}-${{ github.run_number }}
          path: |
            /tmp/build.log
            /tmp/build-retry.log

            /tmp/download.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Release job
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:

      contents: write

    steps:

      - name: Checkout this repository

        uses: actions/checkout@v4



      - name: Download firmware artifacts

        uses: actions/download-artifact@v4

        with:

          path: firmware-artifacts/

          pattern: "istoreos-plugins-*-${{ github.run_number }}"

          merge-multiple: true



      - name: List and filter firmware files



        run: |

          echo "=== FILTERING FIRMWARE FILES ==="

          echo "All downloaded files:"

          find firmware-artifacts/ -type f 2>/dev/null | sort || echo "No files found"

          

          # 创建干净的固件目录

          mkdir -p clean-firmware

          

          # 只复制真正的固件文件（排除编译中间文件）

          echo ""

          echo "Filtering for actual firmware files..."

          

          # 查找固件文件（常见的扩展名）

          FIRMWARE_FILES=$(find firmware-artifacts/ -type f \( \

            -name "*.img.gz" -o \

            -name "*.img" -o \

            -name "*.bin" -o \

            -name "*.tar.gz" -o \

            -name "*factory*.bin" -o \

            -name "*sysupgrade*.bin" -o \

            -name "*combined*.img" \

          \) 2>/dev/null | sort || true)



          if [ -n "$FIRMWARE_FILES" ]; then

            echo "Found firmware files:"

            echo "$FIRMWARE_FILES"

            echo "$FIRMWARE_FILES" | xargs -I {} cp {} clean-firmware/ 2>/dev/null || true



          else

            echo "No standard firmware files found. Copying all non-source files..."

            # 如果没有找到标准固件文件，复制所有非源码文件

            find firmware-artifacts/ -type f ! -name "*.c" ! -name "*.h" ! -name "*.cpp" ! -name "*.py" ! -name "*.sh" ! -name "*.md" ! -name "*.txt" ! -name "*.json" ! -name "*.yaml" ! -name "*.yml" ! -name "Makefile" ! -name "*.mk" ! -name "*.patch" ! -name "*.diff" 2>/dev/null | head -20 | xargs -I {} cp {} clean-firmware/ 2>/dev/null || true

          fi

          

          echo ""

          echo "Clean firmware files:"

          ls -lh clean-firmware/ 2>/dev/null || echo "No files in clean-firmware"

          

          COUNT=$(find clean-firmware/ -type f 2>/dev/null | wc -l)

          if [ "$COUNT" -eq 0 ]; then

            echo "##[error] No firmware files to release!"

            exit 1

          fi

          echo "Ready to release $COUNT firmware file(s)"



      - name: Generate release tag



        id: tag

        run: |

          TAG="istoreos-24.10-plugins-$(date -u +'%Y%m%d%H%M')"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "[release] Tag: ${TAG}"



      - name: Create GitHub Release

        uses: softprops/action-gh-release@v2

        with:

          tag_name: ${{ steps.tag.outputs.tag }}

          name: "iStoreOS 24.10 + OpenClash + PassWall — ${{ steps.tag.outputs.tag }}"

          body: |

            ## iStoreOS Firmware + Plugins — Automated Build



            Compiled from the official [iStoreOS source](https://github.com/istoreos/istoreos)

            (`istoreos-24.10` branch) with the following additions:



            | 组件 | 来源 |

            |------|------|

            | [luci-app-openclash](https://github.com/vernesong/OpenClash) | OpenClash 插件 |

            | [Clash Meta (mihomo)](https://github.com/MetaCubeX/mihomo) | 已预置于 `/etc/openclash/core/clash_meta` |

            | [luci-app-passwall](https://github.com/xiaorouji/openwrt-passwall) | PassWall 插件 |

            | [passwall-packages](https://github.com/xiaorouji/openwrt-passwall-packages) | PassWall 依赖（xray、sing-box等） |



            ### 包含平台

            | Target | 说明 |

            |--------|------|

            | x86_64 | PC / 虚拟机（EFI + BIOS） |

            | arm64  | 通用 AArch64 / armvirt 64-bit |



            ### 官方原版固件

            不含任何插件的纯官方版本请使用 **Build iStoreOS Firmware** workflow 编译。

          files: clean-firmware/**/*

          draft: false

          prerelease: false

          fail_on_unmatched_files: false

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

