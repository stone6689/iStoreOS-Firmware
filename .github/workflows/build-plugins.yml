name: Build iStoreOS Firmware (with Plugins)

# Trigger: manual only
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target: x86_64 / arm64 / all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - x86_64
          - arm64

env:
  ISTOREOS_REPO: https://github.com/istoreos/istoreos.git
  ISTOREOS_BRANCH: istoreos-24.10

jobs:
  # ---------------------------------------------------------------------------
  # Decide which targets to build
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" = "x86_64" ]; then
            echo 'matrix={"include":[{"target":"x86_64","config":"configs/x86_64-plugins.config","name":"x86_64"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$TARGET" = "arm64" ]; then
            echo 'matrix={"include":[{"target":"arm64","config":"configs/arm64-plugins.config","name":"arm64"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"target":"x86_64","config":"configs/x86_64-plugins.config","name":"x86_64"},{"target":"arm64","config":"configs/arm64-plugins.config","name":"arm64"}]}' >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build job
  # ---------------------------------------------------------------------------
  build:
    name: Build iStoreOS+Plugins (${{ matrix.name }})
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "[disk] Available before cleanup:"
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          echo "[disk] Available after cleanup:"
          df -h

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "Updating apt and installing OpenWrt build dependencies..."
          sudo -E apt-get -qq update
          
          # 安装基础编译工具链
          sudo -E apt-get -qq install \
            build-essential \
            bison flex gawk gcc g++ gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev libssl3 \
            python3 python3-dev python3-pyelftools python3-setuptools \
            zlib1g-dev file wget curl rsync subversion \
            ccache cmake automake autoconf libtool pkgconf \
            patch unzip tar bzip2 xz-utils cpio \
            libelf-dev libglib2.0-dev libgmp-dev \
            libmpc-dev libmpfr-dev libreadline-dev \
            texinfo help2man intltool ninja-build \
            scons swig xmlto xxd \
            lzma lzop p7zip-full p7zip \
            upx-ucl uglifyjs \
            libltdl-dev libc6-dev-i386 \
            libsodium-dev libev-dev libc-ares-dev \
            asciidoc doxygen graphviz \
            msmtp nano vim
            
          # 安装 Python 2（如果某些包需要）
          if ! dpkg -l | grep -q python2; then
            sudo -E apt-get -qq install python2 python2-dev
          fi
          
          # 安装 Rust（如果需要）
          if ! command -v rustc &> /dev/null; then
            echo "Installing Rust via rustup..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi
          
          # 安装 Go（PassWall 需要）
          echo "Installing Go..."
          GO_VERSION="1.22.1"
          wget -q "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
          sudo tar -C /usr/local -xzf "go${GO_VERSION}.linux-amd64.tar.gz"
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "Go version: $(/usr/local/go/bin/go version)"
          
          # 清理
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Clone iStoreOS source
        run: |
          echo "[source] Cloning ${ISTOREOS_REPO} branch ${ISTOREOS_BRANCH}..."
          git clone \
            --depth 1 \
            --branch "${ISTOREOS_BRANCH}" \
            "${ISTOREOS_REPO}" \
            openwrt
          echo "[source] Clone complete."

      # -----------------------------------------------------------------------
      # Step 1: Write official iStoreOS feeds.conf (without updating yet)
      # Step 2: Inject plugins — appends PassWall feeds to feeds.conf,
      #         adds OpenClash to package/, pre-downloads mihomo kernel
      # Step 3: Update and install ALL feeds in one pass (official + PassWall)
      # This order ensures feeds.conf is complete before any feeds update runs.
      # -----------------------------------------------------------------------
      - name: Write official iStoreOS feeds.conf
        working-directory: openwrt
        run: |
          printf '%s\n' \
            'src-include defaults feeds.conf.default' \
            'src-git third_party https://github.com/linkease/istore-packages.git;main' \
            'src-git diskman https://github.com/jjm2473/luci-app-diskman.git;dev' \
            'src-git oaf https://github.com/jjm2473/OpenAppFilter.git;dev7' \
            'src-git linkease_nas https://github.com/linkease/nas-packages.git;master' \
            'src-git linkease_nas_luci https://github.com/linkease/nas-packages-luci.git;main' \
            'src-git jjm2473_apps https://github.com/jjm2473/openwrt-apps.git;main' \
            > feeds.conf
          echo "[feeds] feeds.conf written:"
          cat feeds.conf

      - name: Inject plugins (OpenClash + PassWall feeds + mihomo kernel)
        working-directory: openwrt
        run: bash ../scripts/inject-plugins.sh ${{ matrix.target }}

      - name: Update and install all feeds
        working-directory: openwrt
        run: bash ../scripts/setup-feeds.sh

      - name: Apply build configuration
        working-directory: openwrt
        run: |
          echo "[config] Applying ${{ matrix.config }}..."
          cp "../${{ matrix.config }}" .config
          make defconfig
          echo "[config] Final .config packages:"
          grep "^CONFIG_PACKAGE_luci-app-openclash\|^CONFIG_PACKAGE_luci-app-passwall\|^CONFIG_TARGET" .config

      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j$(nproc) V=s 2>&1 | tee /tmp/download.log || true
          find dl -size -1024c -delete || true
          echo "[download] Done."

      - name: Compile firmware
        id: compile
        working-directory: openwrt
        run: |
          echo "[build] Starting compilation with $(nproc) threads..."
          if make -j$(nproc) V=s 2>&1 | tee /tmp/build.log; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "[build] Compilation succeeded."
          else
            echo "[build] Multi-thread build failed. Retrying single-threaded for error details..."
            make -j1 V=s 2>&1 | tee /tmp/build-retry.log
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: List all build output files
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "[diag] Full directory structure:"
          find openwrt/bin -type f 2>/dev/null | head -50
          echo "[diag] Targets directory:"
          ls -la openwrt/bin/targets/ 2>/dev/null || echo "targets directory not found"
          echo "[diag] Done."

      - name: Collect firmware files
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "[collect] Starting firmware collection..."
          mkdir -p firmware/${{ matrix.name }}
          
          # 查找固件文件的多种可能路径
          echo "[collect] Searching for firmware files..."
          
          # 方法1：标准查找
          if find openwrt/bin/targets -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.bin" -o -name "*.tar.gz" \) ! -path "*/packages/*" -exec cp {} firmware/${{ matrix.name }}/ \; 2>/dev/null; then
            echo "[collect] Found files with standard pattern"
          else
            echo "[collect] Standard pattern failed, trying alternative..."
            
            # 方法2：查找任何可能的目标文件
            TARGET_PATHS=$(find openwrt/bin -type f 2>/dev/null | grep -v "/packages/" | grep -E "\.(img|gz|bin|tar)$" || true)
            if [ -n "$TARGET_PATHS" ]; then
              echo "[collect] Found files:"
              echo "$TARGET_PATHS"
              echo "$TARGET_PATHS" | xargs -I {} cp {} firmware/${{ matrix.name }}/ 2>/dev/null || true
            else
              # 方法3：如果还是找不到，可能是路径结构不同
              echo "[collect] Could not find standard firmware files"
              echo "[collect] Checking alternative directory structure..."
              
              # iStoreOS 可能使用不同的输出目录
              if [ -d "openwrt/bin/targets/x86" ]; then
                echo "[collect] Found x86 target directory"
                find openwrt/bin/targets/x86 -type f -exec cp {} firmware/${{ matrix.name }}/ \; 2>/dev/null || true
              elif [ -d "openwrt/bin/targets/x86_64" ]; then
                echo "[collect] Found x86_64 target directory"
                find openwrt/bin/targets/x86_64 -type f -exec cp {} firmware/${{ matrix.name }}/ \; 2>/dev/null || true
              fi
            fi
          fi
          
          echo "[collect] Collected files:"
          ls -lh firmware/${{ matrix.name }}/ 2>/dev/null || echo "No files collected"
          
          # 检查是否收集到了文件
          COUNT=0
          if [ -d "firmware/${{ matrix.name }}" ]; then
            COUNT=$(find firmware/${{ matrix.name }} -type f 2>/dev/null | wc -l)
          fi
          
          if [ "$COUNT" -eq 0 ]; then
            echo "##[error] No firmware images collected!"
            echo "##[error] Debug information:"
            echo "##[error] Current directory: $(pwd)"
            echo "##[error] openwrt/bin structure:"
            find openwrt/bin -type f 2>/dev/null | sort
            exit 1
          else
            echo "[collect] Successfully collected $COUNT firmware file(s)"
          fi
      - name: Upload firmware artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-plugins-${{ matrix.name }}-${{ github.run_number }}
          path: firmware/${{ matrix.name }}/
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-plugins-${{ matrix.name }}-${{ github.run_number }}
          path: |
            /tmp/build.log
            /tmp/build-retry.log
            /tmp/download.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Release job
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/
          pattern: "istoreos-plugins-*-${{ github.run_number }}"
          merge-multiple: false

      - name: List release files
        run: find release-files/ -type f | sort

      - name: Generate release tag
        id: tag
        run: |
          TAG="istoreos-24.10-plugins-$(date -u +'%Y%m%d%H%M')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "[release] Tag: ${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "iStoreOS 24.10 + OpenClash + PassWall — ${{ steps.tag.outputs.tag }}"
          body: |
            ## iStoreOS Firmware + Plugins — Automated Build

            Compiled from the official [iStoreOS source](https://github.com/istoreos/istoreos)
            (`istoreos-24.10` branch) with the following additions:

            | 组件 | 来源 |
            |------|------|
            | [luci-app-openclash](https://github.com/vernesong/OpenClash) | OpenClash 插件 |
            | [Clash Meta (mihomo)](https://github.com/MetaCubeX/mihomo) | 已预置于 `/etc/openclash/core/clash_meta` |
            | [luci-app-passwall](https://github.com/xiaorouji/openwrt-passwall) | PassWall 插件 |
            | [passwall-packages](https://github.com/xiaorouji/openwrt-passwall-packages) | PassWall 依赖（xray、sing-box 等） |

            ### 包含平台
            | Target | 说明 |
            |--------|------|
            | x86_64 | PC / 虚拟机（EFI + BIOS） |
            | arm64  | 通用 AArch64 / armvirt 64-bit |

            ### 官方原版固件
            不含任何插件的纯官方版本请使用 **Build iStoreOS Firmware** workflow 编译。
          files: release-files/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
