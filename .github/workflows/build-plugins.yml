name: Build iStoreOS Firmware (with Plugins)

# Trigger: manual only
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target: x86_64 / arm64 / all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - x86_64
          - arm64

env:
  ISTOREOS_REPO: https://github.com/istoreos/istoreos.git
  ISTOREOS_BRANCH: istoreos-24.10

jobs:
  # ---------------------------------------------------------------------------
  # Decide which targets to build
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" = "x86_64" ]; then
            echo 'matrix={"include":[{"target":"x86_64","config":"configs/x86_64-plugins.config","name":"x86_64"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$TARGET" = "arm64" ]; then
            echo 'matrix={"include":[{"target":"arm64","config":"configs/arm64-plugins.config","name":"arm64"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"target":"x86_64","config":"configs/x86_64-plugins.config","name":"x86_64"},{"target":"arm64","config":"configs/arm64-plugins.config","name":"arm64"}]}' >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build job
  # ---------------------------------------------------------------------------
  build:
    name: Build iStoreOS+Plugins (${{ matrix.name }})
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift /var/lib/docker || true
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          # 确保脚本存在且有执行权限
          chmod +x scripts/*.sh
          bash scripts/install-deps.sh

      - name: Clone iStoreOS source
        run: |
          git clone --depth 1 --branch "${ISTOREOS_BRANCH}" "${ISTOREOS_REPO}" openwrt

      - name: Write official iStoreOS feeds.conf
        working-directory: openwrt
        run: |
          printf '%s\n' \
            'src-include defaults feeds.conf.default' \
            'src-git third_party https://github.com/linkease/istore-packages.git;main' \
            'src-git diskman https://github.com/jjm2473/luci-app-diskman.git;dev' \
            'src-git oaf https://github.com/jjm2473/OpenAppFilter.git;dev7' \
            'src-git linkease_nas https://github.com/linkease/nas-packages.git;master' \
            'src-git linkease_nas_luci https://github.com/linkease/nas-packages-luci.git;main' \
            'src-git jjm2473_apps https://github.com/jjm2473/openwrt-apps.git;main' \
            > feeds.conf

      - name: Inject plugins (OpenClash + PassWall feeds + mihomo kernel)
        working-directory: openwrt
        run: bash ../scripts/inject-plugins.sh ${{ matrix.target }}

      - name: Update and install all feeds
        working-directory: openwrt
        run: bash ../scripts/setup-feeds.sh

      - name: Apply build configuration
        working-directory: openwrt
        run: |
          cp "../${{ matrix.config }}" .config
          make defconfig

      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j$(nproc) || true
          find dl -size -1024c -delete

      - name: Compile firmware
        id: compile
        working-directory: openwrt
        run: |
          # 使用 V=s 捕捉详细错误，如果失败则尝试单线程重新编译
          if make -j$(nproc) V=s; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Multi-thread build failed. Retrying single-threaded..."
            make -j1 V=s
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: List files for debugging
        if: always()
        run: |
          echo "Listing all files in openwrt/bin to find firmware:"
          ls -R openwrt/bin/ || echo "Bin directory not found!"

      - name: Collect firmware files
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p firmware/${{ matrix.name }}
          # 扩大查找范围到整个 bin 目录，忽略掉 ipk 文件夹
          find openwrt/bin/ -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.bin" -o -name "*.tar.gz" \) ! -path "*/packages/*" -exec cp {} firmware/${{ matrix.name }}/ \;
          
          # 检查是否真的拷贝到了文件
          if [ -z "$(ls -A firmware/${{ matrix.name }}/)" ]; then
            echo "::error::No firmware files found! Check the 'List files for debugging' step output."
            exit 1
          fi
          echo "[artifact] Files collected:"
          ls -lh firmware/${{ matrix.name }}/

      - name: Upload firmware artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: istoreos-plugins-${{ matrix.name }}-${{ github.run_number }}
          path: firmware/${{ matrix.name }}/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Release job
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/
          pattern: "istoreos-plugins-*-${{ github.run_number }}"
          merge-multiple: false

      - name: Generate release tag
        id: tag
        run: |
          TAG="istoreos-24.10-plugins-$(date -u +'%Y%m%d%H%M')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "iStoreOS 24.10 + Plugins — ${{ steps.tag.outputs.tag }}"
          body: |
            ## iStoreOS 自动编译版本
            - 源码: istoreos-24.10
            - 包含: OpenClash, PassWall
          files: release-files/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
